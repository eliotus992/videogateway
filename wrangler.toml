name = "videogateway"
main = "src/worker.ts"
compatibility_date = "2024-01-01"

# Workers 特性
[build]
command = "npm run build:worker"

# 环境变量
[vars]
NODE_ENV = "production"

# Secrets（通过 wrangler secret put 设置）
# SEEDANCE_API_KEY
# KLING_API_KEY  
# RUNWAY_API_KEY
# WEBHOOK_SECRET

# D1 数据库（用于存储 API keys 和任务状态）
[[d1_databases]]
binding = "DB"
database_name = "videogateway"
database_id = "your-database-id-here"

# KV 命名空间（用于速率限制和缓存）
[[kv_namespaces]]
binding = "CACHE"
id = "your-kv-namespace-id-here"

# Queue（用于异步任务）
[[queues.producers]]
binding = "GENERATION_QUEUE"
queue = "video-generation"

[[queues.consumers]]
queue = "video-generation"
max_batch_size = 10
max_batch_timeout = 30

# 触发器（可选：定时任务）
[[triggers]]
crons = ["0 * * * *"]
